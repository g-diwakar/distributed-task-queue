services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    entrypoint: ["/bin/server"]
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      HTTP_ADDR: ":8080"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["/bin/worker"]
    environment:
      REDIS_ADDR: redis:6379
      WORKER_COUNT: "5"
    depends_on:
      redis:
        condition: service_healthy
